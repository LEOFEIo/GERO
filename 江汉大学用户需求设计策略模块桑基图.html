<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图4.4 用户需求→设计策略→设计模块 桑基图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimSun', 'Microsoft YaHei', serif; background: #fff; padding: 30px; }
        h1 { text-align: center; font-size: 16px; margin-bottom: 5px; font-weight: normal; }
        h2 { text-align: center; font-size: 14px; margin-bottom: 20px; color: #666; font-weight: normal; }
        .sankey-container { max-width: 1100px; margin: 0 auto; position: relative; }
        canvas { display: block; margin: 0 auto; }
        .legend { display: flex; justify-content: center; gap: 25px; margin-top: 20px; font-size: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 16px; height: 12px; border-radius: 2px; }
        .note { text-align: center; font-size: 11px; color: #888; margin-top: 15px; line-height: 1.8; }
        .column-labels { display: flex; justify-content: space-between; max-width: 1000px; margin: 0 auto 10px; padding: 0 60px; }
        .col-label { font-size: 13px; font-weight: bold; color: #333; text-align: center; width: 200px; }
    </style>
</head>
<body>
    <h1>图4.4 用户需求→设计策略→设计模块 桑基图（Sankey Diagram）</h1>
    <h2>Figure 4.4 Sankey Diagram: User Needs → Design Strategy → Design Modules</h2>
    <div class="column-labels">
        <div class="col-label">用户需求层<br><span style="font-size:11px;color:#888;">(基于186份问卷)</span></div>
        <div class="col-label">设计策略层<br><span style="font-size:11px;color:#888;">(第四章)</span></div>
        <div class="col-label">设计模块层<br><span style="font-size:11px;color:#888;">(第五章)</span></div>
    </div>
    <div class="sankey-container">
        <canvas id="sankeyCanvas" width="1000" height="600"></canvas>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#4CAF50;"></div>沉浸式叙事策略</div>
        <div class="legend-item"><div class="legend-color" style="background:#2196F3;"></div>多模态交互策略</div>
        <div class="legend-item"><div class="legend-color" style="background:#FF9800;"></div>情感化体验策略</div>
        <div class="legend-item"><div class="legend-color" style="background:#9C27B0;"></div>技术适配策略</div>
    </div>
    <div class="note">
        注：流量宽度与需求权重成正比，数据基于第三章186份有效问卷的统计结果。<br>
        桑基图揭示了"多模态交互策略"是最大的需求汇聚节点，"交互原型开发"是策略落地的核心载体。
    </div>

    <script>
        const canvas = document.getElementById('sankeyCanvas');
        const ctx = canvas.getContext('2d');

        // Node definitions with positions
        // Left column: User Needs (x=50)
        const needNodes = [
            { id: 'n1', label: '信息快速检索\n(权重68%)', x: 50, y: 50, w: 140, h: 55, color: '#E8F5E9' },
            { id: 'n2', label: '历史影像还原\n(权重55%)', x: 50, y: 130, w: 140, h: 50, color: '#E8F5E9' },
            { id: 'n3', label: '深度展品互动\n(权重68%)', x: 50, y: 205, w: 140, h: 55, color: '#E3F2FD' },
            { id: 'n4', label: '数字人导览\n(权重55%)', x: 50, y: 285, w: 140, h: 50, color: '#E3F2FD' },
            { id: 'n5', label: '个人印记留存\n(权重47%)', x: 50, y: 360, w: 140, h: 45, color: '#FFF3E0' },
            { id: 'n6', label: '社交分享功能\n(权重45%)', x: 50, y: 430, w: 140, h: 45, color: '#F3E5F5' },
            { id: 'n7', label: '学科成果展示\n(权重56%)', x: 50, y: 500, w: 140, h: 50, color: '#E8F5E9' },
        ];

        // Middle column: Design Strategies (x=420)
        const strategyNodes = [
            { id: 's1', label: '沉浸式叙事策略', x: 420, y: 80, w: 140, h: 70, color: '#4CAF50' },
            { id: 's2', label: '多模态交互策略', x: 420, y: 190, w: 140, h: 85, color: '#2196F3' },
            { id: 's3', label: '情感化体验策略', x: 420, y: 320, w: 140, h: 80, color: '#FF9800' },
            { id: 's4', label: '技术适配策略', x: 420, y: 445, w: 140, h: 65, color: '#9C27B0' },
        ];

        // Right column: Design Modules (x=790)
        const moduleNodes = [
            { id: 'm1', label: '空间结构与\n动线设计', x: 790, y: 60, w: 140, h: 60, color: '#C8E6C9' },
            { id: 'm2', label: '交互原型开发', x: 790, y: 155, w: 140, h: 70, color: '#BBDEFB' },
            { id: 'm3', label: '数字人导览系统', x: 790, y: 265, w: 140, h: 65, color: '#FFE0B2' },
            { id: 'm4', label: '视觉界面设计', x: 790, y: 370, w: 140, h: 60, color: '#C8E6C9' },
            { id: 'm5', label: '系统集成与测试', x: 790, y: 465, w: 140, h: 55, color: '#E1BEE7' },
        ];

        // Links: [from, to, weight, color]
        const links = [
            // Needs → Strategies
            { from: 'n1', to: 's1', weight: 27, color: 'rgba(76,175,80,0.3)' },
            { from: 'n1', to: 's2', weight: 41, color: 'rgba(33,150,243,0.3)' },
            { from: 'n2', to: 's1', weight: 38, color: 'rgba(76,175,80,0.3)' },
            { from: 'n2', to: 's3', weight: 17, color: 'rgba(255,152,0,0.3)' },
            { from: 'n3', to: 's2', weight: 54, color: 'rgba(33,150,243,0.3)' },
            { from: 'n3', to: 's4', weight: 14, color: 'rgba(156,39,176,0.3)' },
            { from: 'n4', to: 's2', weight: 28, color: 'rgba(33,150,243,0.3)' },
            { from: 'n4', to: 's3', weight: 27, color: 'rgba(255,152,0,0.3)' },
            { from: 'n5', to: 's3', weight: 42, color: 'rgba(255,152,0,0.3)' },
            { from: 'n5', to: 's4', weight: 5, color: 'rgba(156,39,176,0.3)' },
            { from: 'n6', to: 's4', weight: 27, color: 'rgba(156,39,176,0.3)' },
            { from: 'n6', to: 's3', weight: 18, color: 'rgba(255,152,0,0.3)' },
            { from: 'n7', to: 's1', weight: 22, color: 'rgba(76,175,80,0.3)' },
            { from: 'n7', to: 's2', weight: 34, color: 'rgba(33,150,243,0.3)' },
            // Strategies → Modules
            { from: 's1', to: 'm1', weight: 52, color: 'rgba(76,175,80,0.35)' },
            { from: 's1', to: 'm4', weight: 35, color: 'rgba(76,175,80,0.35)' },
            { from: 's2', to: 'm2', weight: 78, color: 'rgba(33,150,243,0.35)' },
            { from: 's2', to: 'm3', weight: 47, color: 'rgba(33,150,243,0.35)' },
            { from: 's2', to: 'm1', weight: 32, color: 'rgba(33,150,243,0.35)' },
            { from: 's3', to: 'm3', weight: 42, color: 'rgba(255,152,0,0.35)' },
            { from: 's3', to: 'm4', weight: 36, color: 'rgba(255,152,0,0.35)' },
            { from: 's3', to: 'm2', weight: 26, color: 'rgba(255,152,0,0.35)' },
            { from: 's4', to: 'm2', weight: 23, color: 'rgba(156,39,176,0.35)' },
            { from: 's4', to: 'm5', weight: 23, color: 'rgba(156,39,176,0.35)' },
        ];

        // Helper: find node by id
        function findNode(id) {
            return [...needNodes, ...strategyNodes, ...moduleNodes].find(n => n.id === id);
        }

        // Draw a curved flow between two nodes
        function drawFlow(fromNode, toNode, weight, color, fromOffset, toOffset) {
            const startX = fromNode.x + fromNode.w;
            const startY = fromNode.y + fromOffset;
            const endX = toNode.x;
            const endY = toNode.y + toOffset;
            const thickness = Math.max(weight * 0.35, 3);

            const cp1x = startX + (endX - startX) * 0.4;
            const cp2x = startX + (endX - startX) * 0.6;

            ctx.beginPath();
            ctx.moveTo(startX, startY - thickness / 2);
            ctx.bezierCurveTo(cp1x, startY - thickness / 2, cp2x, endY - thickness / 2, endX, endY - thickness / 2);
            ctx.lineTo(endX, endY + thickness / 2);
            ctx.bezierCurveTo(cp2x, endY + thickness / 2, cp1x, startY + thickness / 2, startX, startY + thickness / 2);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        // Draw node boxes
        function drawNode(node, isStrategy) {
            ctx.fillStyle = isStrategy ? node.color : node.color;
            ctx.strokeStyle = isStrategy ? node.color : '#999';
            ctx.lineWidth = isStrategy ? 2 : 1;

            // Rounded rect
            const r = 6;
            ctx.beginPath();
            ctx.roundRect(node.x, node.y, node.w, node.h, r);
            if (isStrategy) {
                ctx.globalAlpha = 0.2;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.stroke();
            } else {
                ctx.fill();
                ctx.stroke();
            }

            // Text
            ctx.fillStyle = isStrategy ? node.color : '#333';
            ctx.font = isStrategy ? 'bold 12px Microsoft YaHei' : '11px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const lines = node.label.split('\n');
            const lineHeight = 15;
            const startTextY = node.y + node.h / 2 - (lines.length - 1) * lineHeight / 2;
            lines.forEach((line, i) => {
                ctx.fillText(line, node.x + node.w / 2, startTextY + i * lineHeight);
            });
        }

        // Track offsets for proper flow stacking
        function calculateOffsets() {
            const nodeOffsets = {};
            [...needNodes, ...strategyNodes, ...moduleNodes].forEach(n => {
                nodeOffsets[n.id] = { outOffset: 10, inOffset: 10 };
            });

            const drawnLinks = [];
            links.forEach(link => {
                const fromNode = findNode(link.from);
                const toNode = findNode(link.to);
                const thickness = Math.max(link.weight * 0.35, 3);

                const fromOff = nodeOffsets[link.from].outOffset;
                const toOff = nodeOffsets[link.to].inOffset;

                drawnLinks.push({ ...link, fromOffset: fromOff, toOffset: toOff });

                nodeOffsets[link.from].outOffset += thickness + 3;
                nodeOffsets[link.to].inOffset += thickness + 3;
            });
            return drawnLinks;
        }

        // Render
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw flows
            const drawnLinks = calculateOffsets();
            drawnLinks.forEach(link => {
                const fromNode = findNode(link.from);
                const toNode = findNode(link.to);
                drawFlow(fromNode, toNode, link.weight, link.color, link.fromOffset, link.toOffset);
            });

            // Draw nodes
            needNodes.forEach(n => drawNode(n, false));
            strategyNodes.forEach(n => drawNode(n, true));
            moduleNodes.forEach(n => drawNode(n, false));
        }

        render();
    </script>
</body>
</html>
